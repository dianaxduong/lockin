<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lock in ⚡️">
<title>Lock in ⚡️</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj4KICA8ZGVmcz4KICAgIDxsaW5lYXJHcmFkaWVudCBpZD0iYmciIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPgogICAgICA8c3RvcCBvZmZzZXQ9IjAlIiBzdHlsZT0ic3RvcC1jb2xvcjojZmY2ZWI0Ii8+CiAgICAgIDxzdG9wIG9mZnNldD0iNTAlIiBzdHlsZT0ic3RvcC1jb2xvcjojYzA4NGZjIi8+CiAgICAgIDxzdG9wIG9mZnNldD0iMTAwJSIgc3R5bGU9InN0b3AtY29sb3I6I2E3OGJmYSIvPgogICAgPC9saW5lYXJHcmFkaWVudD4KICA8L2RlZnM+CiAgPHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTIiIGZpbGw9InVybCgjYmcpIi8+CiAgPHRleHQgeD0iMjU2IiB5PSIzNDAiIGZvbnQtc2l6ZT0iMzAwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXBwbGUgQ29sb3IgRW1vamksIFNlZ29lIFVJIEVtb2ppLCBzYW5zLXNlcmlmIj7imqHvuI88L3RleHQ+Cjwvc3ZnPg==">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #fce4ff 0%, #e8d5ff 40%, #d4e4ff 100%);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow: hidden;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 300px; height: 300px; background: radial-gradient(circle, #f9a8d455, transparent 70%); top: -60px; left: -80px; }
  .blob2 { width: 250px; height: 250px; background: radial-gradient(circle, #c4b5fd55, transparent 70%); bottom: 40px; right: -40px; }
  .blob3 { width: 180px; height: 180px; background: radial-gradient(circle, #93c5fd44, transparent 70%); top: 45%; right: 10%; }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  header {
    padding: 18px 24px 10px;
    flex-shrink: 0;
  }

  .star-row { display: flex; gap: 6px; margin-bottom: 4px; }
  .star { font-size: 14px; color: #ff6eb4; animation: sparkle 2s ease-in-out infinite; display: inline-block; }

  h1 {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6eb4 0%, #c084fc 50%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .pill {
    display: inline-block;
    background: linear-gradient(135deg, #fdf4ff, #ede9fe);
    border: 1.5px solid #e9d5ff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #7c3aed;
    margin-top: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    padding: 10px 16px 14px;
    flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    height: 50px;
    border-radius: 18px;
    border: 2px solid #e9d5ff;
    background: rgba(255,255,255,0.9);
    padding: 0 18px;
    font-size: 15px;
    font-weight: 700;
    color: #5b21b6;
    outline: none;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 16px rgba(196,165,253,0.2);
  }
  input[type="text"]::placeholder { color: #d8b4fe; }

  .add-btn {
    width: 50px; height: 50px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, #ff6eb4, #c084fc);
    color: #fff;
    font-size: 30px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 6px 20px #ff6eb488;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
    line-height: 1;
    padding-bottom: 2px;
  }
  .add-btn:active { transform: scale(0.9); }

  .list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 20px;
    -webkit-overflow-scrolling: touch;
  }

  .section-label {
    font-size: 13px; font-weight: 800; color: #c4b5fd;
    margin: 12px 0 10px 4px;
  }

  .task-card {
    border-radius: 20px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, opacity 0.15s;
    animation: popIn 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .task-card.drag-over { transform: scale(1.025) rotate(0.5deg); }
  .task-card.dragging { opacity: 0.35; }

  .task-inner {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 12px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    position: relative;
    z-index: 1;
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    min-height: 58px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .check-btn {
    background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0;
    transition: transform 0.15s;
  }
  .check-btn:active { transform: scale(0.88); }

  .check-circle {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 13px; font-weight: 800; color: #fff;
  }
  .check-circle.done {
    background: linear-gradient(135deg, #ff6eb4, #c084fc);
    border-color: transparent;
    box-shadow: 0 2px 8px #ff6eb466;
  }

  .task-text {
    flex: 1;
    font-size: 15px; font-weight: 700; line-height: 1.3;
    color: #3b1d5e;
    word-break: break-word;
  }
  .task-text.done {
    text-decoration: line-through;
    color: #c4b5fd;
  }

  .grip {
    display: flex; flex-direction: column; gap: 3px;
    padding: 4px 2px; cursor: grab; opacity: 0.35;
  }
  .grip span { display: block; width: 16px; height: 2.5px; border-radius: 2px; }

  .delete-reveal {
    position: absolute; right: 0; top: 0; bottom: 0; width: 76px;
    background: linear-gradient(135deg, #ff6eb4, #f43f5e);
    border: none; color: #fff; font-weight: 800; font-size: 13px;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    border-radius: 0 20px 20px 0;
    box-shadow: -2px 0 12px #ff6eb444;
  }

  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 0; gap: 8px;
    text-align: center;
  }
  .empty-emoji { font-size: 52px; margin-bottom: 4px; animation: float 3s ease-in-out infinite; }
  .empty-title { font-size: 20px; font-weight: 900; color: #7c3aed; }
  .empty-sub { font-size: 14px; font-weight: 700; color: #c4b5fd; }

  .home-bar {
    height: calc(20px + env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .home-bar-line {
    width: 120px; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, #f9a8d4, #c084fc);
    opacity: 0.5;
  }

  @keyframes popIn { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes sparkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="app">
  <header>
    <div class="star-row">
      <span class="star" style="animation-delay:0s">✦</span>
      <span class="star" style="animation-delay:0.4s;font-size:10px">✦</span>
      <span class="star" style="animation-delay:0.8s;font-size:8px">✦</span>
    </div>
    <h1>Lock in ⚡️</h1>
    <div class="pill" id="pill">loading...</div>
  </header>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="what's next? 🌸" autocomplete="off">
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="list" id="list"></div>

  <div class="home-bar"><div class="home-bar-line"></div></div>
</div>

<script>
const COLORS = [
  { bg: "#fff0f9", dot: "#ff6eb4", border: "#ff6eb444", shadow: "#ff6eb433" },
  { bg: "#f5f0ff", dot: "#a78bfa", border: "#a78bfa44", shadow: "#a78bfa33" },
  { bg: "#f0fdf8", dot: "#6ee7b7", border: "#6ee7b744", shadow: "#6ee7b733" },
  { bg: "#fff4f4", dot: "#fda4af", border: "#fda4af44", shadow: "#fda4af33" },
  { bg: "#f0f4ff", dot: "#93c5fd", border: "#93c5fd44", shadow: "#93c5fd33" },
];

let tasks = [];
let nextId = 1;
let dragSrcIndex = null;

function load() {
  try {
    const saved = localStorage.getItem('lockin_tasks');
    if (saved) {
      tasks = JSON.parse(saved);
      nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
    }
  } catch(e) { tasks = []; }
  render();
}

function save() {
  localStorage.setItem('lockin_tasks', JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  tasks.unshift({ id: nextId++, text, done: false });
  input.value = '';
  input.focus();
  save();
  render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  // Keep only the 5 most recently completed tasks
  const done = tasks.filter(t => t.done);
  if (done.length > 5) {
    const oldest = done[0].id;
    tasks = tasks.filter(t => t.id !== oldest);
  }
  save();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function updatePill() {
  const active = tasks.filter(t => !t.done).length;
  const pill = document.getElementById('pill');
  if (tasks.length === 0) pill.textContent = 'add something above ↑';
  else if (active === 0) pill.textContent = 'you did it!! 🎉';
  else pill.textContent = `${active} thing${active !== 1 ? 's' : ''} to go ✨`;
}

function makeCard(task, i, colorIndex) {
  const c = COLORS[colorIndex % COLORS.length];
  const card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.id = task.id;
  card.dataset.index = i;

  const inner = document.createElement('div');
  inner.className = 'task-inner';
  inner.style.background = task.done ? '#f5f5f5' : c.bg;
  inner.style.borderColor = task.done ? '#e5e7eb' : c.border;
  inner.style.boxShadow = task.done ? 'none' : `0 4px 16px ${c.shadow}`;

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = task.done ? '#d1d5db' : c.dot;
  dot.style.boxShadow = task.done ? 'none' : `0 0 6px ${c.dot}`;

  // Check button
  const checkBtn = document.createElement('button');
  checkBtn.className = 'check-btn';
  checkBtn.innerHTML = `<div class="check-circle ${task.done ? 'done' : ''}" style="border-color:${task.done ? 'transparent' : c.dot}">${task.done ? '✓' : ''}</div>`;
  checkBtn.onclick = () => toggleDone(task.id);

  // Text
  const textEl = document.createElement('span');
  textEl.className = 'task-text' + (task.done ? ' done' : '');
  textEl.textContent = task.text;

  inner.appendChild(dot);
  inner.appendChild(checkBtn);
  inner.appendChild(textEl);

  if (!task.done) {
    // Grip
    const grip = document.createElement('div');
    grip.className = 'grip';
    grip.innerHTML = `<span style="background:${c.dot}"></span><span style="background:${c.dot}"></span><span style="background:${c.dot}"></span>`;
    inner.appendChild(grip);
  }

  card.appendChild(inner);

  // Swipe to delete (touch)
  let touchStartX = null;
  let deleteBtn = null;

  inner.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  inner.addEventListener('touchmove', e => {
    if (touchStartX === null) return;
    const dx = touchStartX - e.touches[0].clientX;
    if (dx > 10) {
      const move = Math.min(dx, 76);
      inner.style.transform = `translateX(-${move}px)`;
      inner.style.transition = 'none';
      if (!deleteBtn) {
        deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-reveal';
        deleteBtn.textContent = 'bye! 👋';
        deleteBtn.onclick = () => deleteTask(task.id);
        card.appendChild(deleteBtn);
      }
    }
  }, { passive: true });

  inner.addEventListener('touchend', e => {
    if (touchStartX === null) return;
    const dx = touchStartX - e.changedTouches[0].clientX;
    inner.style.transition = 'transform 0.25s cubic-bezier(.4,0,.2,1)';
    if (dx > 60) {
      inner.style.transform = 'translateX(-76px)';
      if (!deleteBtn) {
        deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-reveal';
        deleteBtn.textContent = 'bye! 👋';
        deleteBtn.onclick = () => deleteTask(task.id);
        card.appendChild(deleteBtn);
      }
    } else {
      inner.style.transform = 'translateX(0)';
      if (deleteBtn) { deleteBtn.remove(); deleteBtn = null; }
    }
    touchStartX = null;
  });

  // Drag to reorder (desktop)
  if (!task.done) {
    card.draggable = true;
    card.addEventListener('dragstart', () => {
      dragSrcIndex = i;
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragenter', e => {
      e.preventDefault();
      document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('dragover', e => e.preventDefault());
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const active = tasks.filter(t => !t.done);
      if (dragSrcIndex !== null && dragSrcIndex !== i) {
        const [moved] = active.splice(dragSrcIndex, 1);
        active.splice(i, 0, moved);
        const done = tasks.filter(t => t.done);
        tasks = [...active, ...done];
        save();
        render();
      }
      dragSrcIndex = null;
    });
  }

  return card;
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  const active = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);

  updatePill();

  if (tasks.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-emoji">🌟</div>
        <p class="empty-title">so free rn!</p>
        <p class="empty-sub">add something above ↑</p>
      </div>`;
    return;
  }

  active.forEach((task, i) => {
    list.appendChild(makeCard(task, i, i));
  });

  if (done.length > 0) {
    const donePhrases = [
      '💅 handled it bestie',
      '✨ that girl behavior',
      '🎀 served and delivered',
      '⚡️ locked in and won',
      '🌸 she got it done',
      '🏆 not her first rodeo',
      '🫧 clean slate era',
      '🌟 absolutely slaying',
      '🔵 devoured it',
      '🔒 blue locked and loaded',
      '⚽️ ego activated bestie',
      '🦋 evolved and transcended',
      '👁️ i am the best in the world',
      '🔥 weapon fully unlocked',
    ];
    const phrase = donePhrases[Math.floor(Math.random() * donePhrases.length)];
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = phrase;
    list.appendChild(label);
    done.forEach((task, i) => {
      list.appendChild(makeCard(task, i, i));
    });
  }
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

load();
</script>
</body>
</html>
